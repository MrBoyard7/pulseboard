name: pulseboard

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pulseboard
      POSTGRES_PASSWORD: pulseboard
      POSTGRES_DB: pulseboard
    ports:
      - "5432:5432"
    volumes:
      - pulseboard_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulseboard"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://pulseboard:pulseboard@db:5432/pulseboard
    ports:
      - "8080:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python -m scripts.seed_data &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ../frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pulseboard_db_data: